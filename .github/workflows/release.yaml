name: Release

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  release-container:
    uses: radiorabe/actions/.github/workflows/release-container.yaml@b37e51397726092d8462a2a9b676ea5a5e3a8deb # v0.44.1
    with:
      image: ghcr.io/radiorabe/acrmonitoring
      name: acrmonitoring
      display-name: Analyse ACRCloud data dumps and generate events for Zabbix
      tags: minimal rhel9 ubi9 rabe minio kafka cloudevents acrcloud
  mkdocs:
    uses: radiorabe/actions/.github/workflows/release-mkdocs.yaml@b37e51397726092d8462a2a9b676ea5a5e3a8deb # v0.44.1
